<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Backyard's Food and Drinks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap)" rel="stylesheet">
</head>
<body>
    <!-- Header Navigation -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo">
                    <div class="logo-circle">
                        <svg class="logo-icon" viewBox="0 0 60 60" fill="none" xmlns="[w3.org](http://www.w3.org/2000/svg)">
                            <circle cx="30" cy="30" r="28" stroke="white" stroke-width="2"/>
                            <text x="30" y="12" text-anchor="middle" fill="white" font-size="6" font-weight="bold">BACKYARD</text>
                            <text x="30" y="55" text-anchor="middle" fill="white" font-size="5">FOOD & DRINKS</text>
                            <!-- Fork and spoon icon -->
                            <g transform="translate(18, 18)">
                                <path d="M8 2v6c0 2-1 3-3 3v11h-2V11c-2 0-3-1-3-3V2h2v5c0 .5.5 1 1 1s1-.5 1-1V2h2v5c0 .5.5 1 1 1s1-.5 1-1V2h2z" fill="white"/>
                                <path d="M20 2c0 0-2 3-2 6s2 4 2 4v10h-2V12s-2-1-2-4 2-6 2-6h2z" fill="white"/>
                            </g>
                            <!-- Leaf decoration -->
                            <path d="M35 20c2-2 5-1 5-1s1 3-1 5-5 1-5 1-1-3 1-5z" fill="#4CAF50"/>
                        </svg>
                    </div>
                </div>
                <div class="greeting">
                    <span class="greeting-hello">Hello!</span>
                    <span class="greeting-text">We are glad to see you :D</span>
                </div>
            </div>
            <div class="header-right">
                <a href="login.html" class="btn btn-light">Log in</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <section class="welcome-section">
            <h1 class="welcome-title">Welcome to Backyard's Food and Drinks!</h1>
            
            <div class="hero-image-container">
                <div class="hero-image">
                    <div class="hero-left">
                        <div class="logo-wall">
                            <div class="logo-circle-large">
                                <svg viewBox="0 0 100 100" fill="none" xmlns="[w3.org](http://www.w3.org/2000/svg)">
                                    <circle cx="50" cy="50" r="45" fill="white" stroke="black" stroke-width="3"/>
                                    <circle cx="50" cy="50" r="38" stroke="black" stroke-width="2"/>
                                    <text x="50" y="20" text-anchor="middle" fill="black" font-size="10" font-weight="bold">BACKYARD</text>
                                    <text x="50" y="88" text-anchor="middle" fill="black" font-size="8">FOOD & DRINKS</text>
                                    <!-- Fork and spoon -->
                                    <g transform="translate(30, 30)">
                                        <path d="M12 5v10c0 3-2 5-5 5v15h-3V20c-3 0-5-2-5-5V5h3v8c0 1 1 2 2 2s2-1 2-2V5h3v8c0 1 1 2 2 2s2-1 2-2V5h3z" fill="black"/>
                                        <path d="M30 5c0 0-3 5-3 10s3 7 3 7v13h-3V22s-3-2-3-7 3-10 3-10h3z" fill="black"/>
                                    </g>
                                    <circle cx="65" cy="35" r="3" fill="#4CAF50"/>
                                    <path d="M68 32c3-3 7-2 7-2s1 4-2 7-7 2-7 2-1-4 2-7z" fill="#4CAF50"/>
                                </svg>
                            </div>
                        </div>
                        <div class="neon-text">
                            <span class="enjoy">enjoy</span>
                            <span class="today">today</span>
                            <span class="sun-icon">☀</span>
                        </div>
                    </div>
                    <div class="hero-right">
                        <div class="green-wall"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section class="about-section">
            <p class="about-label">About us!</p>
            <div class="facebook-link">
                <svg class="facebook-icon" viewBox="0 0 24 24" fill="#1877F2" xmlns="[w3.org](http://www.w3.org/2000/svg)">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                <span class="facebook-text">Backyard's Food and Drinks!</span>
            </div>
        </section>
    </main>
</body>
</html>
